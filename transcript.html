layout: default
title: Sermon transcript
custom_class: transcript-page
custom_css: transcript-page
custom_js: transcript-page
---

<article class="tx">
  <a class="tx-back" id="tx-back" href="javascript:history.back()">← Back</a>

  <header class="tx-head">
    <p class="tx-eyebrow" id="tx-eyebrow">Sermon transcript</p>
    <h1 class="tx-title" id="tx-title">Loading…</h1>
    <p class="tx-meta" id="tx-meta"></p>
    <div class="tx-actions" id="tx-actions" hidden>
      <a class="tx-action tx-action-primary" id="tx-watch" href="#" target="_blank" rel="noopener">▶ Watch on YouTube</a>
    </div>
  </header>

  <div class="tx-body" id="tx-body">
    <p class="tx-loading">Loading transcript…</p>
  </div>

  <!-- Floating back-to-top — fades in once you've scrolled down (or after a
       deep link auto-scrolls you to a moment mid-transcript). -->
  <button class="tx-totop" id="tx-totop" type="button" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</article>
